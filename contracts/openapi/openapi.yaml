components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Access Token（`Authorization: Bearer <access>`）"

  schemas:
    EnvelopeBase:
      type: object
      required: [code, message, data]
      properties:
        code:
          type: integer
          description: 业务成功为 0；非 0 表示失败（与 TECH-002 拦截器约定一致）
        message:
          type: string
        data:
          nullable: true
          description: 业务载荷；成功时按接口而定

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          format: password
          example: "******"
        remember_7d:
          type: boolean
          default: false
          description: |
            用户勾选「7 天内保持登录」时为 true。对齐 TECH-004：服务端可据此与 Refresh **7 天滑动续期**策略一致（如延长 Cookie、或仅 session 级令牌）。

    RefreshRequest:
      type: object
      properties:
        refresh_token:
          type: string
          description: 当 Refresh 未使用 Cookie 时必填

    AuthTokenPair:
      type: object
      required: [access_token, refresh_token, expires_in, token_type]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
          description: Access 有效期（秒）；实现阶段可调
          example: 3600
        token_type:
          type: string
          example: Bearer

    UserMe:
      type: object
      required: [id, username, display_name, is_system_admin, permission_codes]
      properties:
        id:
          type: string
          description: 用户主键（UUID 或雪花，由实现定）
        username:
          type: string
        display_name:
          type: string
        is_system_admin:
          type: boolean
          description: 为 true 时拥有全部权限（TECH-004）
        permission_codes:
          type: array
          items:
            type: string
          description: 有效权限编码并集；管理员可为空数组由后端忽略
        is_mock_profile:
          type: boolean
          description: 为 true 时前端可展示「Mock」等演示标识；生产环境应为 false 或省略

    AuthLoginData:
      allOf:
        - $ref: "#/components/schemas/AuthTokenPair"
        - type: object
          required: [user]
          properties:
            user:
              $ref: "#/components/schemas/UserMe"

    AuthRefreshData:
      allOf:
        - $ref: "#/components/schemas/AuthTokenPair"
        - type: object
          required: [user]
          properties:
            user:
              $ref: "#/components/schemas/UserMe"

    ProjectSummary:
      type: object
      required: [id, name, status]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          description: 与 REQ-M01 项目状态枚举对齐；工作台按此字段分组折叠展示
          example: 进行中
        description:
          type: string
          description: 列表/卡片副文案（可选）；可与 `introduction` 并存，详情页优先展示 `introduction`
        introduction:
          type: string
          description: REQ-M01 项目简介（立项必填；可与 description 同步由前端约定）
        background:
          type: string
          description: REQ-M01 项目背景（立项必填）
        planned_start_at:
          type: string
          format: date-time
          description: REQ-M01 计划开始时间（立项必填，按日解读）
        technical_lead_name:
          type: string
          description: REQ-M01 技术负责人（可选；未选时前端可展示非阻塞提示）
        headcount_frontend:
          type: integer
          minimum: 0
          description: 预计前端人力（可选）
        headcount_backend:
          type: integer
          minimum: 0
          description: 预计后端人力（可选）
        headcount_qa:
          type: integer
          minimum: 0
          description: 预计测试人力（可选）
        stack_frontend:
          type: string
          description: 技术栈-前端（可选；前端为多选下拉，存为「、」或英文逗号分隔的多个条目）
        stack_backend:
          type: string
          description: 技术栈-后端（可选；同上）
        stack_database:
          type: string
          description: 技术栈-数据库（可选；同上）
        stack_middleware:
          type: string
          description: 技术栈-中间件（可选；同上）
        goals:
          type: array
          description: REQ-M01 项目目标（1～3 条，可选）
          items:
            type: string
        scope_in:
          type: string
          description: 项目范围-做什么（可选）
        scope_out:
          type: string
          description: 项目范围-不做什么（可选）
        risk_notes:
          type: string
          description: 风险备注（可选）
        manpower_stack_deferred:
          type: boolean
          description: true 表示「预计人力/技术栈后续由技术负责人补全」（REQ-M01 §3.3）
        updated_at:
          type: string
          format: date-time
          description: 最近更新时间（可选，ISO8601）
        progress_percent:
          type: integer
          minimum: 0
          maximum: 100
          description: 综合完成度 0–100（实现口径可与 M03/M04 对齐，V1 可手工或规则计算）
        iteration_number:
          type: integer
          minimum: 1
          description: 当前第几次迭代（从 1 起；可选，工作台卡片在 Story 前展示「第 N 次迭代」）
        story_count:
          type: integer
          minimum: 0
          description: Story 数量（可选）
        task_open_count:
          type: integer
          minimum: 0
          description: 未完成 Task 数（可选）
        task_total_count:
          type: integer
          minimum: 0
          description: Task 总数（可选；与 task_open_count 组合展示「待办 a/b」）
        bug_open_count:
          type: integer
          minimum: 0
          description: 未关闭缺陷数（M07，可选）
        planned_end_at:
          type: string
          format: date-time
          description: 计划/预计完成日（按日解读；ISO8601，前端展示日期与剩余天数）
        artifacts:
          type: object
          description: |
            各模块资产是否已生成。键约定：`req_doc`、`tech_design`、`api_catalog`、`db_schema`、
            `iteration_board`、`task_board`、`resource_plan`、`change_requests`、`test_harness`、
            `dashboard_board`、`closure_pack`、`ai_workspace` 等；值为 true 表示已生成可进入工作台。
          additionalProperties:
            type: boolean
        tech_delivery_parts:
          type: array
          description: |
            REQ-M02B **技术选型**：项目交付形态拆分（网站、App、小程序、后端等），每段独立填写技术栈、数据库、架构等关键决策。
            **PATCH** 时若出现本字段则 **整表替换**（不出现则不改）。
          items:
            $ref: "#/components/schemas/TechDeliveryPart"

    TechDeliveryPart:
      type: object
      required: [id, delivery_kind]
      properties:
        id:
          type: string
          description: 前端生成的稳定 id（UUID 或时间戳随机后缀），用于列表行 key 与排序
        delivery_kind:
          type: string
          description: |
            交付形态编码，建议：`website` | `mobile_app` | `desktop_exe` | `mini_program` |
            `api_service` | `ops_tool` | `other`
        custom_label:
          type: string
          description: `delivery_kind=other` 时的展示名，或其它情况下可选备注名
        technologies:
          type: string
          description: 该部分采用的主要技术 / 框架（可多值，顿号或换行分隔）
        database:
          type: string
          description: 该部分涉及的数据库或存储（无则填「无」或「共用」）
        architecture:
          type: string
          description: 架构要点（分层、部署形态、与其它部分的关系等）
        notes:
          type: string
          description: 其它说明（可选）

    DashboardIterationOption:
      type: object
      required: [id, name, is_current]
      properties:
        id:
          type: string
          description: 迭代唯一 id；与请求 `iteration_key` 对应（`current`/`all` 除外）
        name:
          type: string
          description: 展示名，如「Sprint 3（进行中）」
        is_current:
          type: boolean
          description: 是否为当前默认迭代（进行中优先）

    DashboardMetricLine:
      type: object
      required: [label, value]
      properties:
        label:
          type: string
        value:
          type: string
          description: 已格式化的展示值（如「7」「12 / 18」）

    DashboardChartSpec:
      type: object
      required: [id, title, option]
      properties:
        id:
          type: string
        title:
          type: string
          description: 小图标题（如「Story 累计完成（按天）」）
        option:
          type: object
          description: ECharts `setOption` JSON；由 Mock/后端生成，前端直接传入图表组件
          additionalProperties: true

    DashboardCard:
      type: object
      required: [kind, title, metrics]
      properties:
        kind:
          type: string
          description: |
            语义键：`iteration_progress`、`task_execution`、`blocked`、`manpower`、`change_request`、`quality`、
            `api_catalog`（可选）、`completion_forecast`（完成预测）、`milestones_plan_actual`（计划与里程碑）等
        title:
          type: string
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/DashboardMetricLine"
        charts:
          type: array
          items:
            $ref: "#/components/schemas/DashboardChartSpec"
          description: 卡片内嵌多角度图表；前端支持点击弹窗放大
        drill:
          type: object
          description: 前端下钻：Vue Router `name` + 可选 query（筛选参数占位）
          properties:
            route_name:
              type: string
            query:
              type: object
              additionalProperties:
                type: string

    DashboardRiskItem:
      type: object
      required: [id, kind, title, subtitle]
      properties:
        id:
          type: string
        kind:
          type: string
          description: task_blocked | bug_high | cr_pending | test_rejected 等
        title:
          type: string
        subtitle:
          type: string
        severity_rank:
          type: integer
          minimum: 0
          description: 越大越优先展示（致命缺陷 > 阻塞 Task > …）

    ProjectDashboardData:
      type: object
      required: [scope_label, iteration_key, iteration_options, cards, risk_items]
      properties:
        scope_label:
          type: string
          description: 人类可读统计范围，如「当前迭代：Sprint 3」或「全部迭代 · 项目维度」
        iteration_key:
          type: string
          description: 回显本次聚合所用的 key（`current` 会解析为具体迭代 id 时可仍回显 `current`）
        iteration_options:
          type: array
          items:
            $ref: "#/components/schemas/DashboardIterationOption"
        cards:
          type: array
          items:
            $ref: "#/components/schemas/DashboardCard"
        risk_items:
          type: array
          items:
            $ref: "#/components/schemas/DashboardRiskItem"
          description: 风险与关注列表，已按 severity_rank 降序；前端可截断展示

    ProjectPatchRequest:
      type: object
      description: 所有字段可选；未出现的不修改。`artifacts` 仅合并出现的键。
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        status:
          type: string
        description:
          type: string
          maxLength: 2000
        introduction:
          type: string
          maxLength: 4000
        background:
          type: string
          maxLength: 4000
        planned_start_at:
          type: string
          format: date-time
        planned_end_at:
          type: string
          format: date-time
        technical_lead_name:
          type: string
        headcount_frontend:
          type: integer
          minimum: 0
        headcount_backend:
          type: integer
          minimum: 0
        headcount_qa:
          type: integer
          minimum: 0
        stack_frontend:
          type: string
          description: 技术栈-前端；多选 UI 存为「、」或英文逗号分隔
        stack_backend:
          type: string
          description: 技术栈-后端；同上
        stack_database:
          type: string
          description: 技术栈-数据库；同上
        stack_middleware:
          type: string
          description: 技术栈-中间件；同上
        goals:
          type: array
          items:
            type: string
        scope_in:
          type: string
        scope_out:
          type: string
        risk_notes:
          type: string
        manpower_stack_deferred:
          type: boolean
        artifacts:
          type: object
          additionalProperties:
            type: boolean
        tech_delivery_parts:
          type: array
          description: 若出现则 **整表替换** 项目技术选型（REQ-M02B）
          items:
            $ref: "#/components/schemas/TechDeliveryPart"

    ProjectCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: 项目名称
          minLength: 1
          maxLength: 200
        description:
          type: string
          description: 列表副文案/简介草稿（可选）；服务端可写入 `description` 或 `introduction`
          maxLength: 2000
        status:
          type: string
          description: 初始状态；缺省由服务端定为「立项流程中」或与 M01 枚举一致
          example: 立项流程中
