  /api/v1/ai/invoke:
    post:
      tags: [ai]
      summary: 调用 AI 能力（AI 网关统一入口）
      operationId: postAiInvoke
      description: |
        通过 AI 网关调用具体能力（由后端根据 `capability` 与 `payload` 编排）。

        对于 `capability = requirement_doc_assist`（REQ-M02 **总**需求文档协作）：
        - `payload.action = chat`
          - `payload.message`：用户本轮输入
          - 响应：`data.suggestion`（建议文本，前端会作为聊天回复逐字展示）
        - `payload.action = generate_doc`
          - `payload.message`：可为空（由历史 `payload.history` + `payload.default_prompt` 驱动）
          - 响应：`data.markdown`（完整需求文档 Markdown，前端应用到编辑器）

        对于 `capability = requirement_module_doc_assist`（REQ-M02 **模块细化**文档协作）：
        - 与 `requirement_doc_assist` 相同 `payload.action` 语义；建议 `payload` 携带 `module_id`、`module_title` 等便于 Agent 聚焦单模块。
        - 响应字段同样为 `data.suggestion` / `data.markdown`（按 action）。

        对于 `capability = tech_design_doc_assist`（REQ-M02B **技术设计总文档**协作）：
        - 与 `requirement_doc_assist` 相同 `payload.action` 语义（`chat` / `generate_doc`）。
        - 建议 `payload` 携带 `project_id`、`version_id`、`version_no`、`markdown`；响应仍为 `data.suggestion` / `data.markdown`。

        对于 `capability = tech_selection_assist`（REQ-M02B **技术选型**表单协作）：
        - `payload.action = chat`：响应 `data.suggestion`（讨论与追问）。
        - `payload.action = generate_tech_selection`：在至少一轮用户对话后调用；建议 `payload` 含 `tech_delivery_parts`（当前表单快照）、`history`（与文档协作相同结构）。
        - 成功响应：`data.tech_delivery_parts`（`TechDeliveryPart[]`，**整表建议**）、`data.summary_markdown`（可选，用于聊天区摘要）；**不**使用 `data.markdown`。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiInvokeRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeAiInvoke"
        "400":
          description: 参数或未知 capability
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
