openapi: 3.0.3
info:
  title: PMP Service API
  description: |
    前后端共用契约草案（**contracts/**）。响应包络见 TECH-004：`{ code, message, data }`，成功时 `code === 0`。

    **鉴权（V1）**：账号密码登录；Access JWT（Bearer）；Refresh 见 TECH-004（实现可选 Cookie HttpOnly；契约中 Body 字段保留作备选）。
  version: 0.3.3-draft

servers:
  - url: http://127.0.0.1:8000
    description: 本地 PMP_Service

tags:
  - name: system
    description: 健康检查等
  - name: auth
    description: 登录、Refresh、当前用户（对齐 TECH-004 / REQ-M09）
  - name: project
    description: 项目列表与立项入口（M01/M09）
  - name: ai
    description: AI 网关（经 ai_gateway；Agent 能力键 capability）
  - name: requirement-doc
    description: |
      REQ-M02 需求文档：总文档 Markdown 版本链；**模块细化文档**（按模块拆分、每模块独立版本链、AI 模块化拆分）。
  - name: tech-design-doc
    description: |
      REQ-M02B **总技术文档** Markdown 版本链（与需求总文档字段形态一致；L2 分模块设计可后续扩展独立资源）。
  - name: planning
    description: |
      REQ-M03 迭代、Story、Task（草案）；REQ-M04 在同一 Task 资源上扩展执行态（状态、负责人等）。

paths:
  /api/v1/health:
    get:
      tags: [system]
      summary: 服务健康检查
      operationId: getHealth
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeHealth"

  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: 账号密码登录
      description: |
        成功返回 Access + Refresh 及当前用户摘要。实现侧需遵守 TECH-004：**每用户仅一条有效 Refresh**（新登录轮换并作废旧 Refresh）。
      operationId: postAuthLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeAuthLogin"
        "401":
          description: 用户名或密码错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeBase"

  /api/v1/auth/refresh:
    post:
      tags: [auth]
      summary: 使用 Refresh 换取新的 Access（及轮换 Refresh）
      description: |
        TECH-004：**滑动续期**、一人一 Refresh。实现推荐 Refresh 走 HttpOnly Cookie；若用 Body，则使用下述 `refresh_token` 字段。
      operationId: postAuthRefresh
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeAuthRefresh"
        "401":
          description: Refresh 无效或已吊销
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeBase"

  /api/v1/auth/me:
    get:
      tags: [auth]
      summary: 当前登录用户（权限摘要）
      description: 供前端恢复会话、渲染菜单（`is_system_admin` 短路全权限，见 TECH-004）。
      operationId: getAuthMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeUserMe"
        "401":
          description: 未登录或 Access 过期
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeBase"

  /api/v1/projects:
    get:
      tags: [project]
      summary: 项目列表（工作台/项目管理）
      description: |
        返回当前用户可见项目摘要（REQ-M09：管理员见全部，普通成员见参与项目；过滤规则在 Service 实现）。
      operationId: listProjects
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: 可选：按名称关键词筛选（实现可选）
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeProjectList"
        "401":
          description: 未登录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeBase"
    post:
      tags: [project]
      summary: 新建项目（M01 最小集）
      description: |
        创建项目并返回摘要；前端成功后可跳转 `GET /api/v1/projects/{projectId}` 或列表刷新。
        权限与 REQ-M01/REQ-M09「新建项目」一致（无权限时返回业务错误码）。
      operationId: createProject
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectCreateRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeProjectOne"
        "401":
          description: 未登录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeBase"

  /api/v1/projects/{projectId}:
    get:
      tags: [project]
      summary: 项目详情（摘要）
      description: 按 id 返回与列表项一致的 `ProjectSummary`；无权限或不存在时业务错误（实现可 404 HTTP + 包络）。
      operationId: getProject
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeProjectOne"
        "401":
          description: 未登录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeBase"
    patch:
      tags: [project]
      summary: 更新项目（部分字段）
      description: |
        仅更新请求体中出现的字段；`artifacts` 与已有对象 **浅合并**（便于「生成」各模块资产标记）。
        度量类字段（如 `progress_percent`）可由服务端禁止写入或仅管理员可写，实现自定。
      operationId: patchProject
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectPatchRequest"
      responses:
        "200":
          description: 成功，返回更新后的 `ProjectSummary`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeProjectOne"
        "401":
          description: 未登录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeBase"

  /api/v1/projects/{projectId}/dashboard:
    get:
      tags: [project]
      summary: 项目 Dashboard 聚合（REQ-M08，V1 只读）
      description: |
        项目内首屏指标与风险列表；**只读聚合**，编辑仍在 M03～M07 等各模块完成。
        查询参数 `iteration_key`：`current`（默认，服务端解析为进行中迭代）、`all`（全量）、或具体迭代 id（与返回体 `iteration_options[].id` 对齐）。
      operationId: getProjectDashboard
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: iteration_key
          in: query
          required: false
          schema:
            type: string
            default: current
            description: current | all | 迭代 id
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeProjectDashboard"
        "401":
          description: 未登录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeBase"

  /api/v1/projects/{projectId}/requirement-doc/versions:
    get:
      tags: [requirement-doc]
      summary: 需求文档版本列表
      description: |
        按 `version_no` 升序返回；`latest_version_id` 为当前链上最新一条（删除最新后自动指向前一条）。
        无版本时 `items` 为空、`latest_version_id` 为 null。
      operationId: listRequirementDocVersions
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeRequirementDocVersionList"
        "401":
          description: 未登录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeBase"
    post:
      tags: [requirement-doc]
      summary: 创建需求文档版本
      description: |
        - `mode=empty`：首版或任意时刻新建空模板。
        - `mode=from_latest`：复制当前 **最新版** 正文生成新版本（列表页「创建」）；若无版本则与 `empty` 等价。
        - `markdown` + `based_on_version_id`：**保存为新版**；`based_on_version_id` 须等于当前最新版 id，否则业务错误（仅允许从最新版分叉出新版本）。
      operationId: postRequirementDocVersion
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequirementDocVersionCreateOrAppend"
      responses:
        "200":
          description: 成功，返回新建或更新后的版本详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeRequirementDocVersionDetail"
        "401":
          description: 未登录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeBase"
        "400":
          description: 参数错误或 based_on 非最新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeBase"

  /api/v1/projects/{projectId}/requirement-doc/versions/{versionId}:
    get:
      tags: [requirement-doc]
      summary: 获取指定版本详情（Markdown 全文）
      operationId: getRequirementDocVersion
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: versionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeRequirementDocVersionDetail"
        "401":
          description: 未登录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeBase"
        "404":
          description: 版本不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeBase"
    patch:
      tags: [requirement-doc]
      summary: 覆盖当前版本正文（不产生新版本）
      description: |
        **仅当 `versionId` 为当前最新版本时允许**；否则返回业务错误。用于用户选择「覆盖当前版本」保存。
      operationId: patchRequirementDocVersion
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: versionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequirementDocVersionPatchBody"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeRequirementDocVersionDetail"
        "401":
          description: 未登录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeBase"
        "400":
          description: 非最新版本禁止覆盖
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeBase"
    delete:
      tags: [requirement-doc]
      summary: 删除指定版本
      description: 删除后 `latest_version_id` 为剩余版本中 `version_no` 最大者。
      operationId: deleteRequirementDocVersion
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: versionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeRequirementDocVersionList"
        "401":
          description: 未登录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeBase"
        "404":
          description: 版本不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeBase"

  /api/v1/projects/{projectId}/tech-design-doc/versions:
    get:
      tags: [tech-design-doc]
      summary: 技术设计总文档 — 版本列表
      description: |
        REQ-M02B：与 `…/requirement-doc/versions` 行为一致（`version_no` 升序、`latest_version_id` 语义相同）。
      operationId: listTechDesignDocVersions
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeRequirementDocVersionList"
        "401":
          description: 未登录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeBase"
    post:
      tags: [tech-design-doc]
      summary: 创建技术设计版本或从最新版保存为新版本
      description: |
        请求体与 `POST …/requirement-doc/versions` 相同：`mode` 或 `markdown` + `based_on_version_id`。
      operationId: postTechDesignDocVersion
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequirementDocVersionCreateOrAppend"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeRequirementDocVersionDetail"
        "401":
          description: 未登录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeBase"
        "400":
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeBase"

  /api/v1/projects/{projectId}/tech-design-doc/versions/{versionId}:
    get:
      tags: [tech-design-doc]
      summary: 获取技术设计指定版本详情
      operationId: getTechDesignDocVersion
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: versionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeRequirementDocVersionDetail"
        "401":
          description: 未登录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeBase"
        "404":
          description: 版本不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeBase"
  /api/v1/projects/{projectId}/tech-design-doc/modules:
    get:
      tags: [tech-design-doc]
      summary: 技术设计文档（按交付部分）模块列表
      operationId: listTechDesignDocModules
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeTechDesignDocModuleList"
  /api/v1/projects/{projectId}/tech-design-doc/modules/auto-create-first:
    post:
      tags: [tech-design-doc]
      summary: 首次按技术选型自动创建交付部分技术文档（事务）
      description: |
        前置条件：技术选型必须完整（每个交付部分需有 形态/技术栈/数据库/架构要点），且存在最新需求文档。
        处理规则：按交付部分批量创建各自 v1；任一部分失败则整体回滚。
      operationId: postTechDesignDocModulesAutoCreateFirst
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeTechDesignDocModuleAutoCreateResult"
        "400":
          description: 技术选型未完成或创建失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeBase"
  /api/v1/projects/{projectId}/tech-design-doc/modules/{moduleId}/versions:
    get:
      tags: [tech-design-doc]
      summary: 指定交付部分技术文档版本列表
      operationId: listTechDesignDocModuleVersions
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: moduleId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeRequirementDocVersionList"
    post:
      tags: [tech-design-doc]
      summary: 指定交付部分技术文档创建版本或保存为新版本
      operationId: postTechDesignDocModuleVersion
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: moduleId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequirementDocVersionCreateOrAppend"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeRequirementDocVersionDetail"
  /api/v1/projects/{projectId}/tech-design-doc/modules/{moduleId}/versions/{versionId}:
    get:
      tags: [tech-design-doc]
      summary: 指定交付部分技术文档版本详情
      operationId: getTechDesignDocModuleVersion
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: moduleId
          in: path
          required: true
          schema:
            type: string
        - name: versionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeRequirementDocVersionDetail"
    patch:
      tags: [tech-design-doc]
      summary: 覆盖指定交付部分当前最新版本正文
      operationId: patchTechDesignDocModuleVersion
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: moduleId
          in: path
          required: true
          schema:
            type: string
        - name: versionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequirementDocVersionPatchBody"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeRequirementDocVersionDetail"
    delete:
      tags: [tech-design-doc]
      summary: 删除指定交付部分技术文档版本
      operationId: deleteTechDesignDocModuleVersion
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: moduleId
          in: path
          required: true
          schema:
            type: string
        - name: versionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeRequirementDocVersionList"
    patch:
      tags: [tech-design-doc]
      summary: 覆盖技术设计当前最新版本正文
      operationId: patchTechDesignDocVersion
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: versionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequirementDocVersionPatchBody"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeRequirementDocVersionDetail"
        "401":
          description: 未登录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeBase"
        "400":
          description: 非最新版本禁止覆盖
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeBase"
