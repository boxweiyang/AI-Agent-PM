  /api/v1/projects/{projectId}/requirement-doc/modules/ai-split:
    post:
      tags: [requirement-doc]
      summary: 模块细化文档 — AI 按总需求拆分并生成各模块初稿
      description: |
        **输入**：始终读取项目下 **总需求文档当前最新版本** 的 Markdown 全文（服务端拉取，请求体不传正文）。

        **模式 `full_replace`**：删除该项目下**全部**已有模块及其版本链，再按 AI 结果重建模块；每个模块写入 **v1** 正文（`markdown`）。

        **模式 `incremental`**：**不修改**任何已有模块的元数据与版本数据；仅当 AI 返回的 **`title`** 经服务端规范化后与已有模块**均不相同**时，**新增**该模块及其 **v1**。标题相同（规范化后）的条目整段跳过（不合并、不覆盖）。

        **AI 原始 JSON 约定**（供网关/Agent 解析后落库，字段名建议保持一致）：
        ```json
        {
          "modules": [
            {
              "title": "认证与账号",
              "summary": "单点登录、会话与账号生命周期",
              "markdown": "# 认证与账号\\n\\n## 目标\\n…"
            }
          ]
        }
        ```
        - `title`：模块名称；**增量判重**与手动建模块均按规范化标题比对（见上）。
        - `summary`：短摘要，可空字符串。
        - `markdown`：该模块 **v1** 完整细化需求正文（Markdown）。

        **响应**：返回**当前**模块列表（与 `GET …/modules` 结构一致）及本次拆分摘要字段。
      operationId: postRequirementDocModulesAiSplit
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequirementDocModuleAiSplitRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeRequirementDocModuleAiSplitResult"
        "400":
          description: 总需求无最新版本不可拆分等
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeBase"
        "401":
          description: 未登录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeBase"

